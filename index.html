```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Video Hero</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  overflow-x:hidden;
  font-family:sans-serif;
}

/* Hero section */
.hero{
  position:relative;
  height:300vh; /* amount of scroll used for video */
}

.video-wrap{
  position:sticky;
  top:0;
  width:100%;
  height:100vh;
  overflow:hidden;
}

#v{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* Content below hero */
.content{
  background:white;
  color:black;
  min-height:100vh;
  padding:80px;
}

h1{
  font-size:4rem;
  margin-bottom:20px;
}
</style>
</head>
<body>

<section class="hero">

  <div class="video-wrap">
    <video id="v" muted playsinline preload="auto">
      <source src="https://res.cloudinary.com/dbiu0zob7/video/upload/MVI_0166_rbqi89.mp4" type="video/mp4">
    </video>
  </div>

</section>

<section class="content">
  <h1>Your Website</h1>
  <p>Put the rest of your page here.</p>
</section>

<script>
const hero = document.querySelector('.hero');
const video = document.getElementById('v');

video.addEventListener('loadedmetadata', () => {

  function update() {

    const rect = hero.getBoundingClientRect();
    const heroHeight = hero.offsetHeight - window.innerHeight;

    let progress = -rect.top / heroHeight;

    progress = Math.max(0, Math.min(progress, 1));

    video.currentTime = progress * video.duration;

    requestAnimationFrame(update);
  }

  update();
});
</script>

</body>
</html>
```
